<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARGILLA — Админпанель</title>
    <meta name="robots" content="noindex, nofollow">

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Inter:wght@300;400;500&display=swap"
        rel="stylesheet">

    <!-- Styles -->
    <link rel="stylesheet" href="css/admin.css">
</head>

<body>
    <div class="admin">
        <!-- ═══════════════════════════════
             SIDEBAR
        ════════════════════════════════ -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar__header">
                <a href="index.html" class="sidebar__logo">ARGILLA</a>
                <span class="sidebar__subtitle">Админпанель</span>
            </div>
            <nav class="sidebar__nav">
                <button class="sidebar__link active" data-tab="products" id="tab-products">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M20 7l-8-4-8 4m16 0l-8 4m8-4v10l-8 4M4 7l8 4M4 7v10l8 4m0-10v10" />
                    </svg>
                    Товары
                </button>
                <button class="sidebar__link" data-tab="events" id="tab-events">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <rect x="3" y="4" width="18" height="18" rx="2" />
                        <line x1="16" y1="2" x2="16" y2="6" />
                        <line x1="8" y1="2" x2="8" y2="6" />
                        <line x1="3" y1="10" x2="21" y2="10" />
                    </svg>
                    Мастер-классы
                </button>
                <button class="sidebar__link" data-tab="promos" id="tab-promos">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path
                            d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2Z" />
                    </svg>
                    Промокоды
                </button>
            </nav>
            <div class="sidebar__footer">
                <button class="sidebar__footer-link" id="btn-export">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3" />
                    </svg>
                    Экспорт данных
                </button>
                <button class="sidebar__footer-link" id="btn-import">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M17 8l-5-5-5 5M12 3v12" />
                    </svg>
                    Импорт данных
                </button>
                <button class="sidebar__footer-link" id="btn-reset">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M1 4v6h6M23 20v-6h-6" />
                        <path d="M20.49 9A9 9 0 005.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 013.51 15" />
                    </svg>
                    Сбросить к дефолту
                </button>
                <a href="index.html" class="sidebar__footer-link">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                        <path d="M18 13v6a2 2 0 01-2 2H5a2 2 0 01-2-2V8a2 2 0 012-2h6M15 3h6v6M10 14L21 3" />
                    </svg>
                    Открыть сайт
                </a>
            </div>
        </aside>

        <!-- ═══════════════════════════════
             MAIN CONTENT
        ════════════════════════════════ -->
        <main class="main">
            <!-- Mobile Menu Button -->
            <button class="mobile-menu-btn" id="mobile-menu-btn">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <line x1="3" y1="6" x2="21" y2="6" />
                    <line x1="3" y1="12" x2="21" y2="12" />
                    <line x1="3" y1="18" x2="21" y2="18" />
                </svg>
            </button>

            <!-- ─── Products Tab ─────────── -->
            <div class="tab-panel active" id="panel-products">
                <div class="main__header">
                    <h1 class="main__title">Товары</h1>
                    <div class="main__actions">
                        <button class="btn btn--primary" id="btn-add-product">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="12" y1="5" x2="12" y2="19" />
                                <line x1="5" y1="12" x2="19" y2="12" />
                            </svg>
                            Добавить товар
                        </button>
                    </div>
                </div>
                <div class="stats" id="products-stats"></div>
                <div class="table-wrap">
                    <table class="table" id="products-table">
                        <thead>
                            <tr>
                                <th></th>
                                <th>Название</th>
                                <th>Категория</th>
                                <th>Цена</th>
                                <th>Скидка</th>
                                <th style="text-align:right">Действия</th>
                            </tr>
                        </thead>
                        <tbody id="products-tbody"></tbody>
                    </table>
                </div>
            </div>

            <!-- ─── Events Tab ───────────── -->
            <div class="tab-panel" id="panel-events">
                <div class="main__header">
                    <h1 class="main__title">Мастер-классы</h1>
                    <div class="main__actions">
                        <button class="btn btn--primary" id="btn-add-event">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="12" y1="5" x2="12" y2="19" />
                                <line x1="5" y1="12" x2="19" y2="12" />
                            </svg>
                            Добавить МК
                        </button>
                    </div>
                </div>
                <div class="stats" id="events-stats"></div>
                <div class="table-wrap">
                    <table class="table" id="events-table">
                        <thead>
                            <tr>
                                <th></th>
                                <th>Название</th>
                                <th>Дата</th>
                                <th>Время</th>
                                <th>Место</th>
                                <th>Мест</th>
                                <th>Цена</th>
                                <th style="text-align:right">Действия</th>
                            </tr>
                        </thead>
                        <tbody id="events-tbody"></tbody>
                    </table>
                </div>
            </div>

            <!-- ─── Promos Tab ───────────── -->
            <div class="tab-panel" id="panel-promos">
                <div class="main__header">
                    <h1 class="main__title">Промокоды</h1>
                    <div class="main__actions">
                        <button class="btn btn--primary" id="btn-add-promo">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                                <line x1="12" y1="5" x2="12" y2="19" />
                                <line x1="5" y1="12" x2="19" y2="12" />
                            </svg>
                            Добавить промокод
                        </button>
                    </div>
                </div>
                <div class="stats" id="promos-stats"></div>
                <div class="table-wrap">
                    <table class="table" id="promos-table">
                        <thead>
                            <tr>
                                <th>Код</th>
                                <th>Тип</th>
                                <th>Значение</th>
                                <th style="text-align:right">Действия</th>
                            </tr>
                        </thead>
                        <tbody id="promos-tbody"></tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <!-- ═══════════════════════════════════
         MODAL (shared, content injected by JS)
    ════════════════════════════════════ -->
    <div class="modal-overlay" id="modal-overlay">
        <div class="modal" id="modal">
            <div class="modal__header">
                <h2 class="modal__title" id="modal-title">Заголовок</h2>
                <button class="modal__close" id="modal-close" aria-label="Закрыть">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none">
                        <path d="M18 6L6 18M6 6l12 12" stroke="currentColor" stroke-width="1.5"
                            stroke-linecap="round" />
                    </svg>
                </button>
            </div>
            <div class="modal__body" id="modal-body"></div>
            <div class="modal__footer" id="modal-footer"></div>
        </div>
    </div>

    <!-- Hidden file input for import -->
    <input type="file" id="import-file" accept=".json" style="display:none">

    <!-- Toast -->
    <div class="toast" id="toast"></div>

    <!-- Scripts -->
    <script src="js/data.js"></script>
    <script src="js/admin.js"></script>
</body>

</html>
